<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1A1A2E;
      --orange:  #C8572E;
      --yellow:  #C99A30;
      --green:   #3A8F72;
      --indigo:  #6366F1;
      --pink:    #B85C8A;
      --purple:  #7A5BB0;
      --muted:   #9CA3AF;
      --surface: rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.09);
      --text:    #F9FAFB;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100svh;
      padding: 0 0 4rem;
      cursor: none;
      overflow-x: hidden;
    }

    .cursor {
      width: 8px; height: 8px;
      background: var(--orange);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      top: 0; left: 0;
      mix-blend-mode: screen;
    }
    @media (hover: none) { body { cursor: auto; } .cursor { display: none; } }
    a { cursor: none; }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.14;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--yellow); top: -140px; right: -80px;  animation: drift 8s  ease-in-out infinite; }
    .blob-2 { width: 320px; height: 320px; background: var(--pink);   bottom: -60px; left: -60px; animation: drift 11s ease-in-out infinite reverse; }
    .blob-3 { width: 200px; height: 200px; background: var(--indigo); top: 45%;  right: 22%;     animation: drift 7s  ease-in-out infinite 2s; }
    .blob-4 { width: 260px; height: 260px; background: var(--purple); bottom: 20%; left: 32%;    animation: drift 9s  ease-in-out infinite 1s; }

    @keyframes drift {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(28px,-18px) scale(1.05); }
      66%       { transform: translate(-18px,14px) scale(0.95); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.4rem 0 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.09);
      margin-bottom: 2rem;
    }

    .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .logo em { font-style: italic; color: var(--green); font-weight: 400; }

    .back {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .back:hover { color: var(--text); }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }
    .card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.15rem;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-arrow {
      color: var(--muted);
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .card:hover .card-arrow { transform: translateX(3px); color: var(--text); }

    .icon-todo     { background: rgba(58,  143, 114, 0.15); }
    .icon-bookmark { background: rgba(99,  102, 241, 0.15); }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="wrap">
    <header>
      <div class="logo">desk<em>.</em></div>
      <a class="back" href="../index.html">← back</a>
    </header>

    <div class="grid">
      <a class="card" href="todo/index.html">
        <div class="card-icon icon-todo">✅</div>
        <div class="card-body">
          <div class="card-name">Todo</div>
          <div class="card-desc">Task list</div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="bookmark/index.html">
        <div class="card-icon icon-bookmark">🔖</div>
        <div class="card-body">
          <div class="card-name">Bookmarks</div>
          <div class="card-desc">Saved links</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
    });
  </script>
</body>
</html>
