<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hub — todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #1A1A2E;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --muted:   #9CA3AF;
      --orange:  #C8572E;
      --yellow:  #C99A30;
      --indigo:  #6366F1;
      --pink:    #B85C8A;
      --green:   #3A8F72;
      --purple:  #7A5BB0;
      --text:    #F9FAFB;
      --text-dim:#D1D5DB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      height: 100svh;
      overflow: hidden;
      cursor: none;
    }

    .cursor {
      width: 6px; height: 6px;
      background: var(--orange);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease, background 0.2s ease;
      mix-blend-mode: screen;
    }
    .cursor.big { transform: scale(4); background: var(--yellow); }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.14;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--yellow); top: -140px; right: -80px;  animation: drift 8s  ease-in-out infinite; }
    .blob-2 { width: 320px; height: 320px; background: var(--pink);   bottom: -60px; left: -60px; animation: drift 11s ease-in-out infinite reverse; }
    .blob-3 { width: 200px; height: 200px; background: var(--indigo); top: 45%;   right: 22%;    animation: drift 7s  ease-in-out infinite 2s; }
    .blob-4 { width: 260px; height: 260px; background: var(--purple); bottom: 20%; left: 32%;    animation: drift 9s  ease-in-out infinite 1s; }

    @keyframes drift {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(28px,-18px) scale(1.05); }
      66%       { transform: translate(-18px,14px) scale(0.95); }
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100svh;
      display: flex;
      align-items: stretch;
      padding: clamp(1.8rem, 3.5vh, 2.8rem) clamp(2.5rem, 6vw, 5rem);
      gap: clamp(2rem, 4vw, 3.5rem);
    }

    .sidebar {
      flex-shrink: 0;
      width: clamp(180px, 22vw, 280px);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 0.3rem;
    }

    .nav-links {
      display: flex;
      gap: 0.4rem;
    }

    .nav-lnk {
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 0.55rem;
      color: var(--muted);
      border: 1.5px solid transparent;
      transition: all 0.2s ease;
    }
    .nav-lnk:hover { color: var(--text); }
    .nav-lnk.active {
      color: var(--text);
      border-color: var(--orange);
      background: rgba(200,87,46,0.1);
    }

    .page-heading {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 3.8vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      margin-top: 1rem;
    }
    .page-heading em { font-style: italic; color: var(--yellow); }

    .stat {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .stat b { color: var(--text); font-weight: 600; }

    .filter-row {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.25rem 0.65rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--muted);
      cursor: none;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { color: var(--text); border-color: var(--indigo); background: rgba(99,102,241,0.12); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      min-height: 0;
      padding-top: 0.3rem;
    }

    .add-row {
      display: flex;
      gap: 0.6rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--orange); }
    input::placeholder { color: var(--muted); }

    .btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.7rem 1.3rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: none;
      white-space: nowrap;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { opacity: 0.85; transform: translateY(0); }

    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-right: 0.3rem;
    }
    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 0.8rem;
      padding: 0.75rem 1rem;
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: rgba(255,255,255,0.14); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      flex-shrink: 0;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .check:hover { border-color: var(--green); background: rgba(58,143,114,0.12); }
    .todo-item.done .check { background: var(--green); border-color: var(--green); }
    .check svg { opacity: 0; transition: opacity 0.18s; }
    .todo-item.done .check svg { opacity: 1; }

    .todo-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--text-dim);
      word-break: break-word;
      transition: color 0.2s;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: none;
      padding: 0.15rem 0.4rem;
      border-radius: 0.4rem;
      opacity: 0;
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .todo-item:hover .del { opacity: 1; }
    .del:hover { color: var(--pink); background: rgba(184,92,138,0.12); }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.35; }
    .empty-text { font-size: 0.88rem; }

    a, button { cursor: none; }

    @media (hover: none) {
      body, a, button { cursor: auto; }
      .cursor { display: none; }
      .del { opacity: 1; }
    }

    @media (max-width: 640px) {
      .page {
        flex-direction: column;
        padding: 1.2rem 1.2rem 1.2rem;
        gap: 0.8rem;
        height: 100svh;
      }

      .sidebar {
        width: 100%;
        flex-shrink: 0;
        gap: 0.5rem;
      }

      .nav-links { order: 0; }

      .page-heading {
        font-size: 1.6rem;
        margin-top: 0.2rem;
      }

      .stat { font-size: 0.8rem; }

      .filter-row {
        margin-top: 0;
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filter-row::-webkit-scrollbar { display: none; }

      .main {
        flex: 1;
        min-height: 0;
      }

      input[type="text"] { font-size: 0.85rem; padding: 0.6rem 0.85rem; }
      .btn { padding: 0.6rem 1rem; font-size: 0.84rem; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <div class="page">

    <div class="sidebar">
      <nav class="nav-links">
        <a class="nav-lnk active" href="../todo/index.html">todo</a>
        <a class="nav-lnk" href="../bookmark/index.html">bookmarks</a>
      </nav>
      <h1 class="page-heading">my <em>tasks.</em></h1>
      <p class="stat" id="stat">loading…</p>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">all</button>
        <button class="filter-btn" data-filter="active">active</button>
        <button class="filter-btn" data-filter="done">done</button>
      </div>
    </div>

    <div class="main">
      <div class="add-row">
        <input type="text" id="todo-input" placeholder="what needs to be done…" autocomplete="off">
        <button class="btn" id="add-btn">add</button>
      </div>
      <div class="list" id="todo-list"></div>
    </div>

  </div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX - 3 + 'px';
      cursor.style.top  = e.clientY - 3 + 'px';
    });
    document.addEventListener('mouseover', e => {
      cursor.classList.toggle('big', !!e.target.closest('a, button, .check'));
    });

    let todos = JSON.parse(localStorage.getItem('hub-todos') || '[]');
    let filter = 'all';

    const save = () => localStorage.setItem('hub-todos', JSON.stringify(todos));

    const esc = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    function render() {
      const active = todos.filter(t => !t.done).length;
      const done   = todos.filter(t =>  t.done).length;
      document.getElementById('stat').innerHTML =
        `<b>${active}</b> remaining · <b>${done}</b> done`;

      const visible = todos.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done : t.done
      );

      const list = document.getElementById('todo-list');

      if (visible.length === 0) {
        const msgs = {
          all:    ['✓', 'nothing here — add something above'],
          active: ['🎉', 'all tasks done!'],
          done:   ['○', 'nothing completed yet'],
        };
        const [icon, text] = msgs[filter];
        list.innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`;
        return;
      }

      list.innerHTML = visible.map(t => {
        const i = todos.indexOf(t);
        return `
          <div class="todo-item ${t.done ? 'done' : ''}" data-i="${i}">
            <div class="check" data-toggle="${i}">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="todo-text">${esc(t.text)}</div>
            <button class="del" data-del="${i}">×</button>
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-toggle]').forEach(el => {
        el.addEventListener('click', () => {
          todos[+el.dataset.toggle].done = !todos[+el.dataset.toggle].done;
          save(); render();
        });
      });
      list.querySelectorAll('[data-del]').forEach(el => {
        el.addEventListener('click', () => {
          todos.splice(+el.dataset.del, 1);
          save(); render();
        });
      });
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text  = input.value.trim();
      if (!text) return;
      todos.unshift({ text, done: false, id: Date.now() });
      save(); render();
      input.value = '';
      input.focus();
    }

    document.getElementById('add-btn').addEventListener('click', addTodo);
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    render();
  </script>
</body>
</html>
