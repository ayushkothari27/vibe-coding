<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flaggle — Daily Flag Puzzle</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1A1A2E;
      --card:   #22223a;
      --orange: #C8572E;
      --yellow: #C99A30;
      --green:  #3A8F72;
      --indigo: #6366F1;
      --muted:  #9CA3AF;
      --border: rgba(255,255,255,0.09);
      --text:   #F9FAFB;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100svh;
      padding: 0 0 3rem;
      cursor: none;
    }

    /* ─── cursor ─── */
    .cursor {
      width: 8px; height: 8px;
      background: var(--orange);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    @media (hover: none) { body { cursor: auto; } .cursor { display: none; } }
    a, button, input, [role="option"] { cursor: none; }

    /* ─── layout ─── */
    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* ─── header ─── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.4rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.4rem;
    }
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--yellow); }
    .day-tag {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* ─── flag card ─── */
    .flag-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.2rem 1rem;
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .flag-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 190px;
      margin-bottom: 0.85rem;
    }
    #flag-img {
      max-height: 180px;
      max-width: 100%;
      object-fit: contain;
      border-radius: 5px;
      transition: filter 0.8s ease;
      display: block;
    }
    .blur-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .pips {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .pip.used   { background: var(--orange); border-color: var(--orange); }
    .pip.won    { background: var(--green);  border-color: var(--green); }
    .pip.active { border-color: var(--yellow); }

    /* ─── reveal banner ─── */
    .reveal-banner {
      display: none;
      align-items: center;
      gap: 0.6rem;
      background: rgba(58,143,114,0.12);
      border: 1px solid rgba(58,143,114,0.3);
      border-radius: 9px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .reveal-banner.fail {
      background: rgba(200,87,46,0.1);
      border-color: rgba(200,87,46,0.3);
    }
    .reveal-banner.show { display: flex; }

    /* ─── input ─── */
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .input-wrap {
      flex: 1;
      position: relative;
    }
    #guess-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.65rem 0.9rem;
      font-family: inherit;
      font-size: 1rem;        /* ≥16px prevents iOS zoom on focus */
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
    }
    #guess-input:focus { border-color: rgba(255,255,255,0.25); }
    #guess-input:disabled { opacity: 0.4; }

    .guess-btn {
      flex-shrink: 0;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 0.65rem 1.1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.12s;
    }
    .guess-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .guess-btn:active:not(:disabled) { transform: translateY(0); }
    .guess-btn:disabled { opacity: 0.35; }

    /* ─── autocomplete dropdown ─── */
    #dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #2a2a47;
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #dropdown.open { display: block; }
    .dd-item {
      padding: 0.55rem 0.9rem;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.1s;
    }
    .dd-item:hover, .dd-item.focused {
      background: rgba(255,255,255,0.08);
    }
    .dd-flag { font-size: 1.1rem; flex-shrink: 0; }
    .dd-name { flex: 1; }
    .dd-match { color: var(--yellow); font-weight: 600; }

    /* ─── guesses ─── */
    .guesses { display: flex; flex-direction: column; gap: 0.5rem; }

    .guess-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      display: grid;
      grid-template-columns: 1.6rem 1fr auto;
      gap: 0.5rem;
      align-items: center;
      animation: slideIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .guess-row.correct { border-color: rgba(58,143,114,0.45); }

    .gr-flag  { font-size: 1.25rem; text-align: center; }
    .gr-name  { font-size: 0.88rem; font-weight: 500; }

    .gr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-width: 90px;
    }
    .gr-dist {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .gr-bar-wrap {
      width: 90px;
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .gr-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease 0.1s;
    }
    .gr-dir {
      font-size: 1rem;
      line-height: 1;
    }

    /* ─── share ─── */
    .share-row {
      display: none;
      margin-top: 1rem;
      gap: 0.5rem;
    }
    .share-row.show { display: flex; }
    .share-btn {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.65rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .share-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
    .share-btn.copied { color: var(--green); border-color: rgba(58,143,114,0.4); }

    /* ─── how to ─── */
    .how {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      margin-top: 1.4rem;
    }
    .how strong { color: var(--text); }

    /* ─── mobile ─── */
    @media (max-width: 480px) {
      .wrap        { padding: 0 1rem; }
      .flag-wrap   { min-height: 160px; }
      #flag-img    { max-height: 150px; }
      .flag-card   { padding: 1rem 0.9rem 0.8rem; }
      .gr-bar-wrap { width: 68px; }
      .gr-right    { min-width: 72px; }
      .gr-name     { font-size: 0.82rem; }
    }
    /* safe-area padding for notched phones */
    body { padding-bottom: max(3rem, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="wrap">

  <header>
    <div class="logo">🌍 Flag<span>gle</span></div>
    <div class="day-tag" id="day-tag">—</div>
  </header>

  <!-- Flag -->
  <div class="flag-card">
    <div class="flag-wrap">
      <img id="flag-img" src="" alt="Today's flag" draggable="false">
    </div>
    <div class="blur-label" id="blur-label"></div>
    <div class="pips" id="pips"></div>
  </div>

  <!-- Reveal banner -->
  <div class="reveal-banner" id="reveal-banner"></div>

  <!-- Input -->
  <div class="input-row" id="input-row">
    <div class="input-wrap">
      <input
        id="guess-input"
        type="text"
        placeholder="Country name…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <div id="dropdown"></div>
    </div>
    <button class="guess-btn" id="guess-btn">Guess</button>
  </div>

  <!-- Guess history -->
  <div class="guesses" id="guesses"></div>

  <!-- Share -->
  <div class="share-row" id="share-row">
    <button class="share-btn" id="share-btn">📋 Copy results</button>
  </div>

  <!-- How to play -->
  <p class="how">
    Guess the country from its flag — <strong>6 chances</strong>.<br>
    Each wrong guess reveals the flag more and shows how far away you were.
  </p>

</div>

// ─────────────────────────────────────────────────
//  DAILY ANSWER (seeded by date)
// ─────────────────────────────────────────────────
// Deterministic shuffle with LCG so same day = same country
function seededShuffle(arr, seed) {
  const a = arr.slice();
  let s = seed >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const DAILY_LIST = seededShuffle(COUNTRIES, 0xF1A6616);

const TODAY = new Date().toISOString().slice(0, 10);
const EPOCH = new Date('2025-01-01T00:00:00Z');
const DAY_N = Math.floor((Date.now() - EPOCH) / 86400000) + 1;
const ANSWER = DAILY_LIST[DAY_N % DAILY_LIST.length];
const MAX_G  = 6;

// ─────────────────────────────────────────────────
//  GEO MATH
// ─────────────────────────────────────────────────
function haversine(a, b) {
  const R  = 6371;
  const p1 = a.lat * Math.PI / 180, p2 = b.lat * Math.PI / 180;
  const dp = (b.lat - a.lat) * Math.PI / 180;
  const dl = (b.lon - a.lon) * Math.PI / 180;
  const x  = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(x)));
}

function bearing(from, to) {
  const p1 = from.lat * Math.PI / 180, p2 = to.lat * Math.PI / 180;
  const dl = (to.lon - from.lon) * Math.PI / 180;
  const y  = Math.sin(dl) * Math.cos(p2);
  const x  = Math.cos(p1)*Math.sin(p2) - Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

const DIR_ARROWS = ['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
function dirArrow(deg) { return DIR_ARROWS[Math.round(deg / 45) % 8]; }

function closePct(km) { return Math.max(0, Math.min(100, Math.round((1 - km / 20000) * 100))); }

function barColor(pct) {
  if (pct >= 80) return '#3A8F72';
  if (pct >= 50) return '#C99A30';
  if (pct >= 25) return '#C8572E';
  return '#9f2e0f';
}

// ─────────────────────────────────────────────────
//  FLAG EMOJI
// ─────────────────────────────────────────────────
function flagEmoji(code) {
  if (code === 'xk') return '🏳️'; // Kosovo — no unicode flag
  return [...code.toUpperCase()].map(ch =>
    String.fromCodePoint(0x1F1E6 + ch.charCodeAt(0) - 65)
  ).join('');
}

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
const STORE_KEY = `flaggle_${TODAY}`;
let state = JSON.parse(localStorage.getItem(STORE_KEY) || 'null') || {
  guesses: [],   // [{code, name, dist, pct, dir, correct}]
  done: false,
  won:  false,
};

// ─────────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────────
const $flagImg    = document.getElementById('flag-img');
const $pips       = document.getElementById('pips');
const $blurLabel  = document.getElementById('blur-label');
const $banner     = document.getElementById('reveal-banner');
const $inputRow   = document.getElementById('input-row');
const $input      = document.getElementById('guess-input');
const $dropdown   = document.getElementById('dropdown');
const $btn        = document.getElementById('guess-btn');
const $guesses    = document.getElementById('guesses');
const $shareRow   = document.getElementById('share-row');
const $shareBtn   = document.getElementById('share-btn');

// ─────────────────────────────────────────────────
//  BLUR SCHEDULE
// ─────────────────────────────────────────────────
const BLURS = [22, 16, 11, 7, 4, 2, 0]; // px blur per wrong guess count
const GRAYS = [100, 85, 65, 40, 18, 5, 0]; // % grayscale per wrong guess count

function currentFilter() {
  if (state.done) return 'none';
  const wrong = state.guesses.filter(g => !g.correct).length;
  const i = Math.min(wrong, BLURS.length - 1);
  return `blur(${BLURS[i]}px) grayscale(${GRAYS[i]}%)`;
}

// ─────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────
function renderFlag() {
  $flagImg.src    = `https://flagcdn.com/w640/${ANSWER.c}.png`;
  $flagImg.style.filter = currentFilter();
  document.getElementById('day-tag').textContent = `#${DAY_N}`;
}

function renderPips() {
  $pips.innerHTML = '';
  const wrong = state.guesses.filter(g => !g.correct).length;
  for (let i = 0; i < MAX_G; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (state.won && state.guesses[i]?.correct) pip.classList.add('won');
    else if (i < wrong)                         pip.classList.add('used');
    else if (i === wrong && !state.done)        pip.classList.add('active');
    $pips.appendChild(pip);
  }
  const left = MAX_G - wrong;
  $blurLabel.textContent = state.done ? '' : `${left} guess${left !== 1 ? 'es' : ''} remaining`;
}

function renderGuessRow(g, animate = false) {
  const row = document.createElement('div');
  row.className = 'guess-row' + (g.correct ? ' correct' : '') + (animate ? ' new' : '');

  const pct = g.pct;
  row.innerHTML = `
    <div class="gr-flag">${flagEmoji(g.code)}</div>
    <div class="gr-name">${g.name}</div>
    <div class="gr-right">
      <div class="gr-dist">${g.correct ? '✅ 0 km' : `${g.dir} ${g.dist.toLocaleString()} km`}</div>
      <div class="gr-bar-wrap">
        <div class="gr-bar-fill" style="width:${pct}%; background:${barColor(pct)}"></div>
      </div>
    </div>
  `;
  return row;
}

function renderGuesses(animate = false) {
  $guesses.innerHTML = '';
  state.guesses.forEach((g, i) => {
    const row = renderGuessRow(g, animate && i === state.guesses.length - 1);
    $guesses.appendChild(row);
  });
}

function renderBanner() {
  if (!state.done) { $banner.classList.remove('show'); return; }
  $banner.classList.add('show');
  if (state.won) {
    const idx = state.guesses.length;
    $banner.className = 'reveal-banner show';
    $banner.innerHTML = `✅ ${ANSWER.n} — got it in ${idx}/${MAX_G}!`;
  } else {
    $banner.className = 'reveal-banner fail show';
    $banner.innerHTML = `The flag was <strong>${flagEmoji(ANSWER.c)} ${ANSWER.n}</strong>`;
  }
}

function renderShare() {
  if (!state.done) { $shareRow.classList.remove('show'); return; }
  $shareRow.classList.add('show');
}

function renderInput() {
  if (state.done) {
    $input.disabled = true;
    $btn.disabled   = true;
    $input.placeholder = 'Game over';
  }
}

function render(animateLast = false) {
  renderFlag();
  renderPips();
  renderGuesses(animateLast);
  renderBanner();
  renderShare();
  renderInput();
}

// ─────────────────────────────────────────────────
//  AUTOCOMPLETE
// ─────────────────────────────────────────────────
const SORTED = [...COUNTRIES].sort((a, b) => a.n.localeCompare(b.n));
const guessedCodes = new Set(state.guesses.map(g => g.code));

let ddItems   = [];
let focusIdx  = -1;

function highlight(text, q) {
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0 || !q) return text;
  return text.slice(0, i) +
    `<span class="dd-match">${text.slice(i, i + q.length)}</span>` +
    text.slice(i + q.length);
}

function openDropdown(q) {
  ddItems = SORTED
    .filter(c => c.n.toLowerCase().includes(q.toLowerCase()) && !guessedCodes.has(c.c))
    .slice(0, 8);
  focusIdx = -1;

  if (!ddItems.length || !q.trim()) {
    $dropdown.classList.remove('open');
    $dropdown.innerHTML = '';
    return;
  }

  $dropdown.innerHTML = ddItems.map((c, i) => `
    <div class="dd-item" data-i="${i}" role="option" tabindex="-1">
      <span class="dd-flag">${flagEmoji(c.c)}</span>
      <span class="dd-name">${highlight(c.n, q)}</span>
    </div>
  `).join('');

  $dropdown.classList.add('open');
  $dropdown.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectItem(parseInt(el.dataset.i));
    });
  });
}

function closeDropdown() {
  $dropdown.classList.remove('open');
  $dropdown.innerHTML = '';
  ddItems  = [];
  focusIdx = -1;
}

function moveFocus(dir) {
  const items = $dropdown.querySelectorAll('.dd-item');
  if (!items.length) return;
  items[focusIdx]?.classList.remove('focused');
  focusIdx = (focusIdx + dir + items.length) % items.length;
  items[focusIdx]?.classList.add('focused');
}

function selectItem(i) {
  const c = ddItems[i];
  if (!c) return;
  $input.value = c.n;
  closeDropdown();
  submitGuess(c);
}

$input.addEventListener('input', () => {
  if (!state.done) openDropdown($input.value.trim());
});
$input.addEventListener('blur', () => { setTimeout(closeDropdown, 150); });
$input.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (focusIdx >= 0) selectItem(focusIdx);
    else if (ddItems.length === 1) selectItem(0);
    else trySubmitFromInput();
  }
  else if (e.key === 'Escape') closeDropdown();
});

$btn.addEventListener('click', trySubmitFromInput);

function trySubmitFromInput() {
  const q   = $input.value.trim().toLowerCase();
  if (!q) return;
  const hit = SORTED.find(c => c.n.toLowerCase() === q && !guessedCodes.has(c.c));
  if (hit) submitGuess(hit);
  else {
    // shake the input
    $input.style.borderColor = 'var(--orange)';
    setTimeout(() => { $input.style.borderColor = ''; }, 600);
  }
}

// ─────────────────────────────────────────────────
//  GUESS LOGIC
// ─────────────────────────────────────────────────
function submitGuess(country) {
  if (state.done) return;
  const correct = country.c === ANSWER.c;
  const dist    = correct ? 0 : haversine(country, ANSWER);
  const pct     = closePct(dist);
  const dir     = correct ? '' : dirArrow(bearing(country, ANSWER));

  const g = { code: country.c, name: country.n, dist, pct, dir, correct };
  state.guesses.push(g);
  guessedCodes.add(country.c);

  const wrong = state.guesses.filter(x => !x.correct).length;
  if (correct)           { state.done = true; state.won = true; }
  else if (wrong >= MAX_G) { state.done = true; state.won = false; }

  localStorage.setItem(STORE_KEY, JSON.stringify(state));

  $input.value = '';
  closeDropdown();
  render(true);
}

// ─────────────────────────────────────────────────
//  SHARE
// ─────────────────────────────────────────────────
$shareBtn.addEventListener('click', () => {
  const lines = [
    `🌍 Flaggle #${DAY_N} — ${state.won ? state.guesses.length : 'X'}/${MAX_G}`,
    '',
    ...state.guesses.map(g =>
      g.correct
        ? `🟩 ${g.name}`
        : `${g.dir} ${g.name} — ${g.dist.toLocaleString()} km`
    ),
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    $shareBtn.textContent = '✅ Copied!';
    $shareBtn.classList.add('copied');
    setTimeout(() => {
      $shareBtn.textContent = '📋 Copy results';
      $shareBtn.classList.remove('copied');
    }, 2500);
  });
});

// ─────────────────────────────────────────────────
//  CURSOR
// ─────────────────────────────────────────────────
const $cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  $cur.style.left = e.clientX + 'px';
  $cur.style.top  = e.clientY + 'px';
});

// ─────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────
render(false);
</script>
