<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Asteroids</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1A2E;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      touch-action: none;
    }

    canvas { display: block; width: 100vw; height: 100svh; }

    /* Touch controls */
    #touch-ctrl {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: none;
      justify-content: space-between;
      padding: 0 1.2rem max(1.8rem, calc(1rem + env(safe-area-inset-bottom, 0px)));
      pointer-events: none;
      z-index: 10;
    }

    @media (pointer: coarse) { #touch-ctrl { display: flex; } }

    .ctrl-group { display: flex; gap: 0.6rem; pointer-events: all; }

    .ctrl-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }

    .ctrl-btn:active,
    .ctrl-btn.pressed {
      background: rgba(255,255,255,0.16);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="touch-ctrl">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-left">◁</button>
    <button class="ctrl-btn" id="btn-right">▷</button>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-thrust">↑</button>
    <button class="ctrl-btn" id="btn-fire">●</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); genStars(); });

// ─────────────────────────────────────────────────
//  PALETTE
// ─────────────────────────────────────────────────
const C = {
  bg:       '#1A1A2E',
  ship:     '#ffffff',
  thrust1:  '#C8572E',
  thrust2:  '#C99A30',
  ast:      '#a78bfa',
  astGlow:  '#7c3aed',
  bullet:   '#C99A30',
  bulletGl: '#C8572E',
  green:    '#3A8F72',
  orange:   '#C8572E',
  yellow:   '#C99A30',
  muted:    '#9CA3AF',
  white:    '#F9FAFB',
};

// ─────────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────────
let AC = null;
let thrGain = null;
let thrOsc  = null;

function ensureAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();

  // Master compressor to prevent clipping
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -12;
  comp.ratio.value     = 4;
  comp.connect(AC.destination);

  // Thruster: sawtooth + lowpass
  thrOsc  = AC.createOscillator();
  const f = AC.createBiquadFilter();
  thrGain = AC.createGain();
  thrOsc.type = 'sawtooth';
  thrOsc.frequency.value = 72;
  f.type = 'lowpass';
  f.frequency.value = 190;
  thrGain.gain.value = 0;
  thrOsc.connect(f); f.connect(thrGain); thrGain.connect(comp);
  thrOsc.start();

  // Store comp ref for other sounds
  AC._out = comp;
}

function setThruster(on) {
  if (!AC || !thrGain) return;
  const t = AC.currentTime;
  thrGain.gain.cancelScheduledValues(t);
  thrGain.gain.setTargetAtTime(on ? 0.1 : 0, t, 0.05);
}

function playLaser() {
  if (!AC) return;
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(920, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, AC.currentTime + 0.11);
  g.gain.setValueAtTime(0.22, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.12);
  osc.connect(g); g.connect(AC._out);
  osc.start(); osc.stop(AC.currentTime + 0.13);
}

function playBoom(size) {
  if (!AC) return;
  const cfg = {
    large:  { dur: 0.65, vol: 0.45, cut: 500 },
    medium: { dur: 0.32, vol: 0.3,  cut: 900 },
    small:  { dur: 0.14, vol: 0.18, cut: 1600 },
  }[size];

  const sr  = AC.sampleRate;
  const len = Math.floor(sr * cfg.dur);
  const buf = AC.createBuffer(1, len, sr);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

  const src = AC.createBufferSource();
  const flt = AC.createBiquadFilter();
  const g   = AC.createGain();
  src.buffer       = buf;
  flt.type         = 'lowpass';
  flt.frequency.value = cfg.cut;
  g.gain.setValueAtTime(cfg.vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + cfg.dur);

  src.connect(flt); flt.connect(g); g.connect(AC._out);
  src.start(); src.stop(AC.currentTime + cfg.dur);
}

function playDeath() {
  if (!AC) return;
  [220, 165, 110].forEach((freq, i) => {
    const osc = AC.createOscillator();
    const g   = AC.createGain();
    const t   = AC.currentTime + i * 0.07;
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(28, t + 0.55);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.connect(g); g.connect(AC._out);
    osc.start(t); osc.stop(t + 0.6);
  });
}

// ─────────────────────────────────────────────────
//  STARS
// ─────────────────────────────────────────────────
let stars = [];
function genStars() {
  stars = Array.from({ length: 130 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 0.3 + Math.random() * 1.1,
    a: 0.15 + Math.random() * 0.85,
  }));
}
genStars();

function drawStars() {
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
}

// ─────────────────────────────────────────────────
//  SHIP
// ─────────────────────────────────────────────────
const ROT   = 0.0038;   // rad/ms
const THRT  = 0.00023;  // px/ms²
const MAXV  = 0.43;     // px/ms
const DRAG  = 0.984;    // per second
const BCOOL = 215;      // ms between shots
const BSPD  = 0.54;     // px/ms
const BLIFE = 1350;     // ms bullet lifetime

class Ship {
  constructor() { this.reset(); }

  reset() {
    this.x = W / 2;  this.y = H / 2;
    this.vx = 0;     this.vy = 0;
    this.angle = 0;
    this.thrusting = false;
    this.dead   = false;
    this.invMs  = 3000;
  }

  update(dt) {
    if (this.dead) return;
    const lt = keys.ArrowLeft  || touch.left;
    const rt = keys.ArrowRight || touch.right;
    const th = keys.ArrowUp    || touch.thrust;

    if (lt) this.angle -= ROT * dt;
    if (rt) this.angle += ROT * dt;

    this.thrusting = th;
    if (th) {
      this.vx += Math.sin(this.angle) * THRT * dt;
      this.vy -= Math.cos(this.angle) * THRT * dt;
      const spd = Math.hypot(this.vx, this.vy);
      if (spd > MAXV) { this.vx = this.vx / spd * MAXV; this.vy = this.vy / spd * MAXV; }
    }

    const df = Math.pow(DRAG, dt / 1000);
    this.vx *= df; this.vy *= df;
    this.x = ((this.x + this.vx * dt) % W + W) % W;
    this.y = ((this.y + this.vy * dt) % H + H) % H;
    if (this.invMs > 0) this.invMs -= dt;
  }

  get visible() { return this.invMs <= 0 || Math.floor(this.invMs / 110) % 2 === 0; }

  draw() {
    if (this.dead || !this.visible) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    ctx.shadowColor = C.ship; ctx.shadowBlur = 10;
    ctx.strokeStyle = C.ship; ctx.lineWidth = 2;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(0, -19);
    ctx.lineTo(-12, 11); ctx.lineTo(-4, 5);
    ctx.lineTo(4, 5);   ctx.lineTo(12, 11);
    ctx.closePath();
    ctx.stroke();

    if (this.thrusting) {
      const fl = 9 + Math.random() * 9;
      ctx.shadowColor = C.thrust1; ctx.strokeStyle = C.thrust1; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-4, 7); ctx.lineTo(0, 13 + fl); ctx.lineTo(4, 7);
      ctx.stroke();
      ctx.shadowColor = C.thrust2; ctx.strokeStyle = C.thrust2; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-2, 7); ctx.lineTo(0, 10 + fl * 0.5); ctx.lineTo(2, 7);
      ctx.stroke();
    }
    ctx.restore();
  }

  get r() { return 13; }
}

// ─────────────────────────────────────────────────
//  ASTEROID
// ─────────────────────────────────────────────────
const AST_R   = { large: 44, medium: 22, small: 11 };
const AST_PTS = { large: 20, medium: 50, small: 100 };

class Asteroid {
  constructor(x, y, size, vx, vy) {
    this.x = x; this.y = y;
    this.size = size; this.vx = vx; this.vy = vy;
    this.rot  = 0;
    this.rotV = (Math.random() - 0.5) * 0.0016;
    this.shape = this._mkShape();
  }

  _mkShape() {
    const n = 7 + Math.floor(Math.random() * 5);
    const r = this.r;
    return Array.from({ length: n }, (_, i) => {
      const a  = (i / n) * Math.PI * 2;
      const rr = r * (0.62 + Math.random() * 0.46);
      return [Math.cos(a) * rr, Math.sin(a) * rr];
    });
  }

  update(dt) {
    this.rot = (this.rot + this.rotV * dt) % (Math.PI * 2);
    this.x = ((this.x + this.vx * dt) % W + W) % W;
    this.y = ((this.y + this.vy * dt) % H + H) % H;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    ctx.shadowColor = C.astGlow; ctx.shadowBlur = 20;
    ctx.strokeStyle = C.ast; ctx.lineWidth = 2; ctx.lineJoin = 'round';

    ctx.beginPath();
    this.shape.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
    ctx.closePath();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle  = 'rgba(124,58,237,0.07)';
    ctx.fill();
    ctx.restore();
  }

  split() {
    if (this.size === 'small') return [];
    const next  = this.size === 'large' ? 'medium' : 'small';
    const speed = Math.hypot(this.vx, this.vy) * 1.45;
    return [0, 1].map(() => {
      const a = Math.random() * Math.PI * 2;
      return new Asteroid(this.x, this.y, next, Math.cos(a) * speed, Math.sin(a) * speed);
    });
  }

  get r()   { return AST_R[this.size]; }
  get pts() { return AST_PTS[this.size]; }
}

// ─────────────────────────────────────────────────
//  BULLET
// ─────────────────────────────────────────────────
class Bullet {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = BLIFE;
  }
  update(dt) {
    this.life -= dt;
    this.x = ((this.x + this.vx * dt) % W + W) % W;
    this.y = ((this.y + this.vy * dt) % H + H) % H;
  }
  draw() {
    ctx.save();
    ctx.shadowColor = C.bulletGl; ctx.shadowBlur = 12;
    ctx.fillStyle   = C.bullet;
    ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  get alive() { return this.life > 0; }
  get r()     { return 4; }
}

// ─────────────────────────────────────────────────
//  PARTICLE
// ─────────────────────────────────────────────────
class Particle {
  constructor(x, y, color, spd = 120) {
    this.x = x; this.y = y;
    const a  = Math.random() * Math.PI * 2;
    const s  = spd * (0.35 + Math.random() * 0.9);
    this.vx  = Math.cos(a) * s;
    this.vy  = Math.sin(a) * s;
    this.life  = 1;
    this.decay = 0.55 + Math.random() * 1.1;
    this.color = color;
    this.sz    = 1 + Math.random() * 2.5;
  }
  update(dt) {
    this.life -= this.decay * dt / 1000;
    this.x    += this.vx * dt / 1000;
    this.y    += this.vy * dt / 1000;
    this.vx   *= 0.975; this.vy *= 0.975;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.shadowColor = this.color; ctx.shadowBlur = 5;
    ctx.fillStyle   = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  get alive() { return this.life > 0; }
}

// ─────────────────────────────────────────────────
//  SCORE POPUP
// ─────────────────────────────────────────────────
class Popup {
  constructor(x, y, text, color = '#fff') {
    this.x = x; this.y = y;
    this.text = text; this.color = color;
    this.life = 1; this.vy = -38;
  }
  update(dt) { this.life -= 1.3 * dt / 1000; this.y += this.vy * dt / 1000; }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.font = '600 13px "Space Grotesk", sans-serif';
    ctx.fillStyle = this.color; ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
  get alive() { return this.life > 0; }
}

// ─────────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────────
let gstate    = 'start'; // start | playing | dead | levelup | gameover
let score     = 0;
let hiScore   = parseInt(localStorage.getItem('ast_hi') || '0');
let lives     = 3;
let level     = 1;
let shootCd   = 0;
let deadTimer = 0;
let lvlTimer  = 0;
let lvlFlash  = '';
let ship, asteroids, bullets, particles, popups;

function spawnWave(lv) {
  const count = 3 + lv;
  const base  = 0.048 + lv * 0.011;
  return Array.from({ length: count }, () => {
    let x, y;
    do {
      const e = Math.floor(Math.random() * 4);
      if      (e === 0) { x = Math.random() * W; y = -55; }
      else if (e === 1) { x = W + 55;  y = Math.random() * H; }
      else if (e === 2) { x = Math.random() * W; y = H + 55; }
      else              { x = -55; y = Math.random() * H; }
    } while (Math.hypot(x - W / 2, y - H / 2) < 155);
    const a = Math.random() * Math.PI * 2;
    const s = base * (0.65 + Math.random() * 0.7);
    return new Asteroid(x, y, 'large', Math.cos(a) * s, Math.sin(a) * s);
  });
}

function burst(x, y, n, colors, spd = 120) {
  for (let i = 0; i < n; i++)
    particles.push(new Particle(x, y, colors[i % colors.length], spd));
}

function startGame() {
  score     = 0; lives = 3; level = 1;
  ship      = new Ship();
  asteroids = spawnWave(1);
  bullets   = []; particles = []; popups = [];
  shootCd   = 0;
  gstate    = 'playing';
}

// ─────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────
const keys  = {};
const touch = { left: false, right: false, thrust: false, fire: false };

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  const nav = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  if (nav.includes(e.code)) e.preventDefault();

  if (e.code === 'Space') {
    ensureAudio();
    if (gstate === 'start' || gstate === 'gameover') startGame();
    else if (gstate === 'playing') tryShoot();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('pointerdown', () => {
  ensureAudio();
  if (gstate === 'start' || gstate === 'gameover') startGame();
});

function bindBtn(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = () => { ensureAudio(); touch[prop] = true;  el.classList.add('pressed'); };
  const off = () => {                touch[prop] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  e => { e.preventDefault(); on();  }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); off(); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); off(); }, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
}
bindBtn('btn-left',   'left');
bindBtn('btn-right',  'right');
bindBtn('btn-thrust', 'thrust');
bindBtn('btn-fire',   'fire');

function tryShoot() {
  if (gstate !== 'playing' || ship.dead || shootCd > 0) return;
  bullets.push(new Bullet(
    ship.x, ship.y,
    Math.sin(ship.angle) * BSPD,
    -Math.cos(ship.angle) * BSPD
  ));
  playLaser();
  shootCd = BCOOL;
}

// ─────────────────────────────────────────────────
//  COLLISION
// ─────────────────────────────────────────────────
function hits(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y) < a.r + b.r;
}

// ─────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────
function update(dt) {
  // Always update particles/popups
  particles.forEach(p => p.update(dt)); particles = particles.filter(p => p.alive);
  popups.forEach(p => p.update(dt));    popups    = popups.filter(p => p.alive);

  if (gstate === 'start') {
    asteroids.forEach(a => a.update(dt));
    return;
  }

  if (gstate === 'levelup') {
    lvlTimer -= dt;
    if (lvlTimer <= 0) { gstate = 'playing'; asteroids = spawnWave(level); }
    return;
  }

  if (gstate === 'dead') {
    asteroids.forEach(a => a.update(dt));
    deadTimer -= dt;
    if (deadTimer <= 0) {
      if (lives <= 0) {
        gstate = 'gameover';
        if (score > hiScore) { hiScore = score; localStorage.setItem('ast_hi', hiScore); }
      } else {
        ship.reset(); gstate = 'playing';
      }
    }
    return;
  }

  if (gstate === 'gameover') return;

  // ── playing ──
  if (shootCd > 0) shootCd -= dt;
  if (touch.fire) tryShoot();

  ship.update(dt);
  setThruster(ship.thrusting);
  asteroids.forEach(a => a.update(dt));
  bullets.forEach(b => b.update(dt));
  bullets = bullets.filter(b => b.alive);

  // Bullet vs Asteroid
  const deadBullets = new Set();
  const deadAsts    = new Set();
  const born        = [];

  bullets.forEach((b, bi) => {
    asteroids.forEach((a, ai) => {
      if (deadAsts.has(ai) || deadBullets.has(bi)) return;
      if (hits(b, a)) {
        deadBullets.add(bi);
        deadAsts.add(ai);
        score += a.pts;
        popups.push(new Popup(a.x, a.y - a.r, `+${a.pts}`, C.yellow));
        born.push(...a.split());
        burst(a.x, a.y,
          a.size === 'large' ? 22 : a.size === 'medium' ? 14 : 7,
          [C.ast, '#c4b5fd', '#ddd6fe', '#F9FAFB'],
          a.size === 'large' ? 140 : 95
        );
        playBoom(a.size);
      }
    });
  });

  bullets   = bullets.filter((_, i) => !deadBullets.has(i));
  asteroids = asteroids.filter((_, i) => !deadAsts.has(i));
  asteroids.push(...born);

  // Ship vs Asteroid
  if (!ship.dead && ship.invMs <= 0) {
    for (const a of asteroids) {
      if (hits(ship, a)) {
        ship.dead = true;
        lives--;
        setThruster(false);
        burst(ship.x, ship.y, 26, [C.ship, C.thrust1, C.thrust2, '#fff'], 150);
        playDeath();
        gstate = 'dead'; deadTimer = 2000;
        break;
      }
    }
  }

  // Wave cleared
  if (asteroids.length === 0) {
    level++;
    setThruster(false);
    lvlFlash = `LEVEL ${level}`;
    lvlTimer = 1700;
    bullets  = [];
    gstate   = 'levelup';
  }
}

// ─────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────
function drawShipIcon(x, y, s = 10) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = C.ship; ctx.lineWidth = 1.5;
  ctx.shadowColor = C.ship; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(0, -s); ctx.lineTo(-s*.65, s*.7);
  ctx.lineTo(-s*.22, s*.35); ctx.lineTo(s*.22, s*.35);
  ctx.lineTo(s*.65, s*.7); ctx.closePath();
  ctx.stroke(); ctx.restore();
}

function drawHUD() {
  ctx.shadowBlur = 0;
  // Score
  ctx.font = '700 22px "Space Grotesk", sans-serif';
  ctx.fillStyle = C.white; ctx.textAlign = 'left';
  ctx.fillText(String(score).padStart(6, '0'), 22, 38);
  // Level
  ctx.font = '400 13px "Space Grotesk", sans-serif';
  ctx.fillStyle = C.muted;
  ctx.fillText(`LVL ${level}`, 22, 58);
  // Lives
  for (let i = 0; i < lives; i++) drawShipIcon(W - 22 - i * 27, 30, 9);
}

function drawOverlay(alpha) {
  ctx.fillStyle = `rgba(26,26,46,${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

function draw() {
  // Background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Game objects
  asteroids.forEach(a => a.draw());

  if (gstate === 'playing' || gstate === 'dead' || gstate === 'levelup') {
    if (gstate !== 'dead') bullets.forEach(b => b.draw());
    ship.draw();
  }

  particles.forEach(p => p.draw());
  popups.forEach(p => p.draw());

  // HUD
  if (gstate === 'playing' || gstate === 'dead' || gstate === 'levelup') {
    drawHUD();
  }

  // ── Start screen ──
  if (gstate === 'start') {
    drawOverlay(0.52);
    ctx.textAlign = 'center';

    // Title glow
    ctx.save();
    ctx.shadowColor = C.ast; ctx.shadowBlur = 40;
    ctx.font = `700 ${Math.min(76, W * 0.13)}px "Space Grotesk", sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText('ASTEROIDS', W / 2, H / 2 - 60);
    ctx.restore();

    ctx.font = '400 15px "Space Grotesk", sans-serif';
    ctx.fillStyle = C.muted;
    ctx.fillText('Arrow keys / WASD · Space to shoot', W / 2, H / 2 - 8);

    ctx.font = '600 18px "Space Grotesk", sans-serif';
    ctx.fillStyle = C.white;
    ctx.fillText('Press SPACE or tap to start', W / 2, H / 2 + 30);

    if (hiScore > 0) {
      ctx.font = '500 14px "Space Grotesk", sans-serif';
      ctx.fillStyle = C.yellow;
      ctx.fillText(`Best: ${hiScore}`, W / 2, H / 2 + 68);
    }
  }

  // ── Level up ──
  if (gstate === 'levelup') {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = C.green; ctx.shadowBlur = 28;
    ctx.font = `700 ${Math.min(54, W * 0.1)}px "Space Grotesk", sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText(lvlFlash, W / 2, H / 2);
    ctx.restore();
  }

  // ── Game over ──
  if (gstate === 'gameover') {
    drawOverlay(0.68);
    ctx.textAlign = 'center';

    ctx.save();
    ctx.shadowColor = C.orange; ctx.shadowBlur = 28;
    ctx.font = `700 ${Math.min(62, W * 0.11)}px "Space Grotesk", sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 52);
    ctx.restore();

    ctx.font = '600 26px "Space Grotesk", sans-serif';
    ctx.fillStyle = C.yellow;
    ctx.fillText(score, W / 2, H / 2 + 8);

    ctx.font = '400 14px "Space Grotesk", sans-serif';
    ctx.fillStyle = C.muted;
    const newBest = score >= hiScore && score > 0;
    ctx.fillText(newBest ? '★ New best!' : hiScore > 0 ? `Best: ${hiScore}` : '', W / 2, H / 2 + 38);

    ctx.font = '600 17px "Space Grotesk", sans-serif';
    ctx.fillStyle = C.white;
    ctx.fillText('Press SPACE or tap to play again', W / 2, H / 2 + 76);
  }
}

// ─────────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────────
let lastTs = null;

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min(ts - lastTs, 60);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Title screen drift asteroids
asteroids = Array.from({ length: 6 }, () => {
  const a = Math.random() * Math.PI * 2;
  const s = 0.03 + Math.random() * 0.04;
  const sz = Math.random() < 0.4 ? 'medium' : 'large';
  return new Asteroid(Math.random() * W, Math.random() * H, sz, Math.cos(a) * s, Math.sin(a) * s);
});
bullets = []; particles = []; popups = [];

// WASD support
window.addEventListener('keydown', e => {
  if (e.code === 'KeyW') keys['ArrowUp']    = true;
  if (e.code === 'KeyA') keys['ArrowLeft']  = true;
  if (e.code === 'KeyS') keys['ArrowDown']  = true;
  if (e.code === 'KeyD') keys['ArrowRight'] = true;
});
window.addEventListener('keyup', e => {
  if (e.code === 'KeyW') keys['ArrowUp']    = false;
  if (e.code === 'KeyA') keys['ArrowLeft']  = false;
  if (e.code === 'KeyS') keys['ArrowDown']  = false;
  if (e.code === 'KeyD') keys['ArrowRight'] = false;
});

requestAnimationFrame(loop);
</script>
</body>
</html>
